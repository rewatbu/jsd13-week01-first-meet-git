<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Menu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f8f5f0; color: #333; padding: 2rem; }
    header { text-align: center; margin-bottom: 2rem; }
    h1 { font-size: 2.5rem; color: #c73e1d; }
    .menu { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; max-width: 960px; margin: 0 auto; }
    .card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h2 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .card .price { font-size: 1.5rem; font-weight: 700; color: #c73e1d; }
    .card .price::before { content: "\0e3f"; }
    footer { text-align: center; margin-top: 3rem; color: #999; font-size: 0.875rem; }
  </style>
</head>
<body>
  <header>
    <h1>Our Menu</h1>
    <p>Fresh homemade Italian food</p>
  </header>

  <div class="menu" id="menu"></div>

  <footer>
    <p><small>&copy; 2026 Food Menu</small></p>
  </footer>

  <script src="my-object.js"></script>
  <script>
    const menuEl = document.getElementById("menu");
    foodDatabase.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h2>${item.name}</h2>
        <p class="price">${item.prize}</p>
      `;
      menuEl.appendChild(card);
    });
  </script>
</body>
</html>
